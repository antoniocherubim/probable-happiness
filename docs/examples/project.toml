schema_version = 1

[bootstrap]
command = ["bash", "scripts/agent-loop/bootstrap.sh"]
timeout_seconds = 300

[executor]
timeout_seconds = 1800
heartbeat_seconds = 30

[reviewer]
timeout_seconds = 1800
heartbeat_seconds = 30

[environment]
required = ["TEST_DATABASE_URL", "POSTGRES_ADMIN_DATABASE_URL"]

[validation]
commands = [
  ["python", "-m", "compileall", "-q", "app"],
  ["bash", "scripts/agent-loop/test.sh"],
  ["git", "diff", "--check"],
]

[instructions]
executor = [".agent-loop/executor.md"]
reviewer = [".agent-loop/reviewer.md"]

[documentation]
required = true
required_paths = [
  "ROADMAP.md",
  "docs/tasks/{task_id}.md",
]

# Opt-in. Omita esta tabela para terminar em HUMAN_APPROVED sem commit/push.
[delivery]
mode = "push_branch"
remote = "origin"
base_branch = "main"
branch_template = "{task_slug}"
commit_message_template = "{task_id}: {task_title}"
push_after_human_approval = true

[policy]
missing_profile = "deny"
terminate_grace_seconds = 5
